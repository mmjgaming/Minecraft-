<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MMJ Servers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0b0f1a;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logo{
font-size:24px;
font-weight:bold;
color:#22c55e;
}

/* NAV LINKS */

.nav-links{
display:flex;
gap:30px;
align-items:center;
position:relative;
}

.nav-links a{
text-decoration:none;
color:#cbd5f5;
font-size:15px;
}

.nav-links a:hover{
color:white;
}

/* DROPDOWN */

.dropdown{
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
top:30px;
background:#111827;
padding:10px;
border-radius:8px;
min-width:150px;
}

.dropdown-content a{
display:block;
padding:8px;
}

.dropdown-content a:hover{
background:#1f2937;
border-radius:5px;
}

.dropdown:hover .dropdown-content{
display:block;
}

/* BUTTON */

.upload-btn{
background:#22c55e;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
color:black;
font-weight:bold;
}

/* HERO */

.hero{
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#0b0f1a,#111827);
}

.hero h1{
font-size:65px;
}

.hero p{
margin-top:10px;
font-size:18px;
color:#9ca3af;
}

.server-btn{
margin-top:30px;
background:#22c55e;
padding:14px 28px;
border-radius:8px;
text-decoration:none;
color:black;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">MMJ Servers</div>

<div class="nav-links">

<div class="dropdown">

<a href="#">Discover Content ▾</a>

<div class="dropdown-content">

<a href="mods.html">Mods</a>

<a href="plugins.html">Plugins</a>

<a href="servers.html">Servers</a>

<a href="modpack.html">Modpacks</a>

</div>

</div>

<a href="servers.html">View Our Servers</a>

<a class="upload-btn" href="upload.html">Upload a Server</a>

</div>

</div>


<section class="hero">

<h1>The place for Minecraft Servers</h1>

<p>Discover mods, plugins, servers and modpacks.</p>

</section>
